name: Build Android APK

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-20.04
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y \
          python3-pip build-essential git \
          ffmpeg libsdl2-dev libsdl2-image-dev \
          libsdl2-mixer-dev libsdl2-ttf-dev \
          libportmidi-dev libswscale-dev \
          libavformat-dev libavcodec-dev \
          libfreetype6-dev libgl1-mesa-dev \
          libgles2-mesa-dev autoconf libtool \
          pkg-config zlib1g-dev libncurses5-dev \
          cmake openjdk-17-jdk unzip zip
        
        pip install --upgrade pip
        pip install Cython==0.29.33
        pip install buildozer==1.5.0
    
    - name: Build APK
      run: |
        buildozer -v android debug
    
    - name: Upload APK
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: android-apk
        path: bin/*.apk
        if-no-files-found: warn
