name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git zip unzip openjdk-17-jdk \
          python3-pip autoconf libtool \
          pkg-config zlib1g-dev \
          libncurses5-dev libncursesw6-dev libtinfo6 \
          cmake libffi-dev libssl-dev automake
    
    - name: Install Buildozer
      run: |
        pip install buildozer cython
    
    - name: Check files before build
      run: |
        echo "=== Current directory ==="
        ls -la
        echo "=== buildozer.spec head ==="
        head -20 buildozer.spec
    
    - name: Build APK
      run: |
        buildozer android debug 2>&1 | tee build.log
        echo "=== Build finished ==="
        ls -la bin/ 2>/dev/null || echo "No bin directory"
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: dual-timer-apk
        path: bin/*.apk
        if-no-files-found: warn
