name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git zip unzip openjdk-17-jdk \
          python3-pip autoconf libtool \
          pkg-config zlib1g-dev \
          libncurses5-dev libtinfo6 \
          cmake libffi-dev libssl-dev automake
    
    - name: Install Buildozer
      run: |
        pip install buildozer cython
    
    - name: Setup Android SDK
      run: |
        mkdir -p ~/.buildozer/android/platform/android-sdk/cmdline-tools
        cd ~/.buildozer/android/platform/android-sdk/cmdline-tools
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip -q commandlinetools-linux-11076708_latest.zip
        mv cmdline-tools latest
        export PATH=$PATH:~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin
        yes | sdkmanager --licenses || true
        sdkmanager "build-tools;33.0.0" "platforms;android-33" "platform-tools"
    
    - name: Build APK
      run: |
        export PATH=$PATH:~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin
        export ANDROIDSDK=~/.buildozer/android/platform/android-sdk
        buildozer android debug 2>&1 | tee build.log
    
    - name: Find APK
      run: |
        find . -name "*.apk" -type f 2>/dev/null || echo "No APK found"
        ls -la bin/ 2>/dev/null || true
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: dual-timer-apk
        path: |
          bin/*.apk
          dist/*.apk
        if-no-files-found: warn
